spring.application.name=monitor
spring.mongodb.uri=mongodb://localhost:27017/compost_db
# This prevents the app from crashing if Mongo isn't ready
spring.data.mongodb.auto-index-creation=true

# Notification defaults
# Configure your SMTP server for email notifications
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Default from/to for alert emails
app.notifications.email.from=compost@localhost
app.notifications.email.to=admin@localhost

# Optional webhook URL to receive alert POSTs (JSON)
app.notifications.webhook.url=